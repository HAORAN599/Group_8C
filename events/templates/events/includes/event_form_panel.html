<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="event-form-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-dark m-0">{{ form_heading }}</h2>
                    <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-4 fw-bold">{{ submit_label }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
