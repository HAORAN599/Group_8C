<div id="customConfirmModal" class="cust-modal-backdrop" hidden>
    <div class="cust-modal-content">
        <div class="cust-modal-header">
            <h5 class="cust-modal-title fw-bold">Confirm Action</h5>
            <button type="button" class="cust-modal-close" data-modal-close>&times;</button>
        </div>
        <div class="cust-modal-body">
            <p id="customModalMessage">Are you sure?</p>
        </div>
        <div class="cust-modal-footer">
            <button type="button" class="btn btn-outline-secondary px-4" data-modal-close>Cancel</button>
            <button type="button" class="btn btn-primary px-4" id="customModalConfirmBtn">Confirm</button>
        </div>
    </div>
</div>
