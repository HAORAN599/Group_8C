<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - University Event Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .hero-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 600px;
        }
        h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 1.5rem; }
        .btn-custom {
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-student { background-color: #fff; color: #667eea; }
        .btn-student:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,255,255,0.3); }
        .btn-admin { background-color: transparent; color: #fff; border: 2px solid #fff; }
        .btn-admin:hover { background-color: #fff; color: #764ba2; }
    </style>
</head>
<body>
    <div class="hero-card">
        <h1>University Society<br>Event Hub</h1>
        <p class="lead mb-5">Discover, follow, and join the best club activities on campus.</p>
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <a href="{% url 'login' %}?role=student" class="btn btn-custom btn-student btn-lg">I'm a Student</a>
            <a href="{% url 'login' %}?role=society_admin" class="btn btn-custom btn-admin btn-lg">Club Admin</a>
        </div>
    </div>
</body>
</html>
