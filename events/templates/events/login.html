<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background: #e9ecef;
            color: #495057;
        }
        .btn-primary { background: #667eea; border: none; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="auth-card text-center">
        <span class="role-badge">
            {% if current_role == 'student' %}Student Portal{% else %}Admin Portal{% endif %}
        </span>
        <h2 class="fw-bold mb-4">Welcome Back</h2>

        {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}?role={{ current_role }}" class="text-start">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">Email or Phone</label>
                <input type="text" name="account" class="form-control" placeholder="Enter your account" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Sign In</button>
        </form>

        <p class="mt-4 mb-0 small text-muted">
            New here? <a href="{% url 'register' %}?role={{ current_role }}" class="text-decoration-none fw-bold">Create account</a>
        </p>
    </div>
</body>
</html>
